name: Cursor Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # Checkout PR code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Cursor Agent
      - name: Install Cursor Agent
        run: |
          echo "Installing Cursor Agent..."
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

          # Verify cursor-agent is available
          echo "Checking cursor-agent installation..."
          cursor-agent --version || echo "cursor-agent not found - will retry in next step"

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Install Node.js dependencies for review script
      - name: Install Node.js dependencies
        run: |
          # Ensure we have the necessary Node.js modules
          npm install --save-dev @types/node

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run ESLint
      - name: Run ESLint
        run: npm run lint

      # Run TypeScript check
      - name: Run TypeScript check
        run: npm run build

      - name: Configure git identity
        run: |
          git config user.name "Cursor Agent"
          git config user.email "cursoragent@cursor.com"

      # Setup Cursor Agent Authentication
      - name: Setup Cursor Agent Authentication
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          echo "Setting up Cursor Agent authentication..."

          # Set the API key for cursor-agent
          echo "export CURSOR_API_KEY=$CURSOR_API_KEY" >> $GITHUB_ENV

          # Verify cursor-agent is available
          if ! cursor-agent --version; then
            echo "❌ cursor-agent not found or not working"
            echo "Attempting to install cursor-agent..."
            
            # Try alternative installation method
            curl -fsSL https://cursor.com/install | bash || {
              echo "❌ Failed to install cursor-agent"
              exit 1
            }
            
            # Add to PATH
            echo "$HOME/.cursor/bin" >> $GITHUB_PATH
            export PATH="$HOME/.cursor/bin:$PATH"
            
            # Verify installation
            if ! cursor-agent --version; then
              echo "❌ cursor-agent still not available after installation"
              exit 1
            fi
          fi

          echo "✅ cursor-agent is available and ready"

      # Run Cursor Agent Code Review
      - name: Run Cursor Agent Code Review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        timeout-minutes: 15
        run: |
          echo "Starting code review with Cursor Agent..."

          # Debug: Check cursor-agent installation
          echo "=== Cursor Agent Debug Info ==="
          echo "cursor-agent version:"
          cursor-agent --version || echo "cursor-agent not found"

          echo "Environment variables:"
          echo "CURSOR_API_KEY is set: $([ -n "$CURSOR_API_KEY" ] && echo "Yes" || echo "No")"

          # Create a review prompt file
          cat > review_prompt.txt << 'EOF'
          Please review this code for:
          1. TypeScript best practices and type safety
          2. React patterns and hooks usage
          3. Component structure and naming conventions
          4. Accessibility considerations
          5. Performance optimizations
          6. Code organization and maintainability
          7. Security best practices

          Provide specific recommendations with line references where applicable.
          Focus on actionable improvements that can be implemented.
          EOF

          # Run cursor-agent for code review
          echo "Running cursor-agent code review..."
          cursor-agent \
            --prompt-file review_prompt.txt \
            --output review_output.txt \
            --model "gpt-4" \
            --verbose || {
            echo "❌ cursor-agent command failed, trying alternative approach..."
            
            # Fallback: Try with different parameters
            cursor-agent \
              --prompt "Review this code for TypeScript best practices, React patterns, accessibility, and performance issues. Provide specific recommendations." \
              --output review_output.txt || {
              echo "❌ cursor-agent failed with all approaches"
              echo "Creating fallback review summary..."
              
              # Create fallback review
              cat > review_output.txt << 'EOF'
          # Code Review Summary (Fallback)

          **Note:** cursor-agent command is not available or not working properly.

          ## Review Status
          - ✅ ESLint check passed
          - ✅ TypeScript compilation successful  
          - ✅ Build process completed

          ## Files Reviewed
          EOF
              
              # Add file list
              find src -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" | while read file; do
                echo "- $file" >> review_output.txt
              done
              
              cat >> review_output.txt << 'EOF'
              
          ## General Recommendations
          - Review TypeScript types and interfaces
          - Check React component patterns and hooks usage
          - Verify accessibility compliance
          - Optimize performance where possible
          - Ensure proper error handling

          **Recommendation:** Verify cursor-agent installation and CURSOR_API_KEY configuration.
          EOF
            }
          }

          echo "Code review completed"

          echo "## 📋 Cursor Agent Code Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🤖 AI Review Results:" >> $GITHUB_STEP_SUMMARY
          cat review_output.txt >> $GITHUB_STEP_SUMMARY

          # Review completed successfully
          echo "✅ Code review completed successfully"
          echo "Review summary has been added to the GitHub Actions summary"
