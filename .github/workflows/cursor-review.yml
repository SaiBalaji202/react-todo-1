name: Cursor Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # Checkout PR code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Cursor Agent
      - name: Install Cursor Agent
        run: |
          echo "Installing Cursor Agent..."
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

          # Verify cursor-agent is available
          echo "Checking cursor-agent installation..."
          cursor-agent --version || echo "cursor-agent not found - will retry in next step"

      - name: Configure git identity
        run: |
          git config user.name "Cursor Agent"
          git config user.email "cursoragent@cursor.com"

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Install Node.js dependencies for review script
      - name: Install Node.js dependencies
        run: |
          # Ensure we have the necessary Node.js modules
          npm install --save-dev @types/node

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      - name: Run Cursor Agent to add a PR review comment
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          # Add an inline comment for [src/TodoList.tsx:30] about duplicate key usage
          # This will show the code diff preview like in the screenshot

          # Method 1: Using GitHub API directly for inline comments
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
            --method POST \
            --field body="🚨 Bug: Duplicate Keys in Todo List

          The \`key\` prop for todo items was changed from \`todo.id\` to a hardcoded \`1\`. All list items now share the same key, which violates React's unique key requirement. This will cause reconciliation issues, leading to incorrect rendering, state management problems, and performance degradation.

          **Suggestion:** Use \`todo.id\` as the key instead of the static key 1." \
            --field path="src/TodoList.tsx" \
            --field position=30

