name: Cursor Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # Checkout PR code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Cursor Agent
      - name: Install Cursor Agent
        run: |
          echo "Installing Cursor Agent..."
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

          # Verify cursor-agent is available
          echo "Checking cursor-agent installation..."
          cursor-agent --version || echo "cursor-agent not found - will retry in next step"

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Install Node.js dependencies for review script
      - name: Install Node.js dependencies
        run: |
          # Ensure we have the necessary Node.js modules
          npm install --save-dev @types/node

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run ESLint
      - name: Run ESLint
        run: npm run lint

      # Run TypeScript check
      - name: Run TypeScript check
        run: npm run build

      - name: Configure git identity
        run: |
          git config user.name "Cursor Agent"
          git config user.email "cursoragent@cursor.com"

      # Setup Cursor Agent Authentication
      - name: Setup Cursor Agent Authentication
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          echo "Setting up Cursor Agent authentication..."

          # Set the API key for cursor-agent
          echo "export CURSOR_API_KEY=$CURSOR_API_KEY" >> $GITHUB_ENV

          # Verify cursor-agent is available
          if ! cursor-agent --version; then
            echo "❌ cursor-agent not found or not working"
            echo "Attempting to install cursor-agent..."
            
            # Try alternative installation method
            curl -fsSL https://cursor.com/install | bash || {
              echo "❌ Failed to install cursor-agent"
              exit 1
            }
            
            # Add to PATH
            echo "$HOME/.cursor/bin" >> $GITHUB_PATH
            export PATH="$HOME/.cursor/bin:$PATH"
            
            # Verify installation
            if ! cursor-agent --version; then
              echo "❌ cursor-agent still not available after installation"
              exit 1
            fi
          fi

          echo "✅ cursor-agent is available and ready"

      # Run Cursor Agent Code Review
      - name: Run Cursor Agent Code Review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.CURSOR_INTEGRATION_API }}
          BLOCKING_REVIEW: ${{ vars.BLOCKING_REVIEW || 'false' }}
          MODEL: ${{ vars.MODEL || 'gpt-5' }}
        run: |
          echo "Starting code review with Cursor Agent..."

          # Debug: Check cursor-agent installation
          echo "=== Cursor Agent Debug Info ==="
          echo "cursor-agent version:"
          cursor-agent --version || echo "cursor-agent not found"

          echo "Environment variables:"
          echo "CURSOR_API_KEY is set: $([ -n "$CURSOR_API_KEY" ] && echo "Yes" || echo "No")"

          echo "Repo: ${{ github.repository }}"
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "PR Base SHA: ${{ github.event.pull_request.base.sha }}"

          # Get the list of changed files in the PR, excluding yml and md files
          echo "Getting changed files (excluding .yml and .md files)..."
          git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | grep -v -E '\.(yml|yaml|md)$' > changed_files.txt
          echo "Changed files to review:"
          cat changed_files.txt

          # Run code review with cursor-agent on changed files
          echo "Running cursor-agent review on changed files..."
          export CURSOR_API_KEY="$CURSOR_API_KEY"

          # Run cursor-agent in background with nohup to prevent hanging
          # Yes, you can manually use the GitHub API to add comments to a pull request.
          # For each suggestion or issue found, use the GitHub API to add a PR comment.
          # For inline code suggestions, use the "suggestion" code block format if possible.
          # Each comment should be posted inline on the exact changed line in the PR diff.

          # Example: To add a review with inline comments (suggestions), use:
          # gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
          #   -f event=COMMENT \
          #   -f body="$SUMMARY" \
          #   -f comments='[$COMMENTS_JSON]'

          # $COMMENTS_JSON should be a JSON array of objects like:
          # [{ "path": "<file>", "position": <diff_position>, "body": "<issue description>\n\n```suggestion\n<suggested code>\n```" }]

          # For each suggestion, construct and submit the comment using the above API call.
          # Do NOT use: gh pr review --approve or --request-changes

          cursor-agent --force --model "$MODEL" --output-format=text --print 'You are operating in a GitHub Actions runner performing automated code review for a React TypeScript project. You may comment on pull requests. The GitHub CLI is available as `gh` and authenticated via `GH_TOKEN`. Git is available. You have write access to repository contents and can comment on pull requests, but you must not create or edit PRs.

          Context:
          - Repo: ${{ github.repository }}
          - PR Number: ${{ github.event.pull_request.number }}
          - PR Head SHA: ${{ github.event.pull_request.head.sha }}
          - PR Base SHA: ${{ github.event.pull_request.base.sha }}
          - Blocking Review: ${{ env.BLOCKING_REVIEW }}

          Project Type: React + TypeScript (Vite or Create React App, using .tsx/.ts files, React functional components, hooks, and modern React patterns).

          Objectives:
          1) Review the current PR diff and flag only clear, high-severity issues specific to React TypeScript code.
          2) For each issue, generate a concrete code suggestion if possible.

          Procedure:
          - Analyze ONLY for React TypeScript project-specific issues, including:
            - Null/undefined dereferences, especially in JSX and hooks
            - Incorrect or missing TypeScript types/annotations (props, state, function signatures, generics)
            - Unsafe use of `any`, `as`, or type assertions that could hide bugs
            - Resource leaks (unclosed subscriptions, timers, event listeners, or effects)
            - Injection (XSS in dangerouslySetInnerHTML, unsanitized user input in JSX)
            - Concurrency/race conditions (e.g., stale closures in hooks, async state updates)
            - Missing error handling for critical operations (API calls, async/await, try/catch)
            - Obvious logic errors with incorrect React behavior (e.g., missing dependencies in useEffect, improper state updates, broken memoization)
            - Clear performance anti-patterns (unnecessary re-renders, expensive computations in render, missing keys in lists)
            - Security vulnerabilities (exposing secrets, unsafe eval, etc.)
            - Accessibility issues (missing alt text, improper ARIA usage, non-interactive elements with click handlers)
            - Avoiding direct DOM manipulation unless necessary
            - Avoiding deprecated React APIs or patterns

          Commenting rules:
          - Max 10 inline comments total; prioritize the most critical issues
          - One issue per comment; place on the exact changed line
          - All issue comments MUST be inline (anchored to a file and line/position in the PR diff)
          - For each issue, use the GitHub API to add a PR suggestion comment (with a code block showing the suggested fix, if possible)
          - Natural tone, specific and actionable; do not mention automation or high-confidence
          - Use emojis: 🚨 Critical 🔒 Security ⚡ Performance ⚠️ Logic ✅ Resolved ✨ Improvement ♿ Accessibility

          Submission:
          - If there are NO issues to report and an existing top-level comment indicating "no issues" already exists (e.g., "✅ no issues", "No issues found", "LGTM"), do NOT submit another comment. Skip submission to avoid redundancy.
          - If there are NO issues to report and NO prior "no issues" comment exists, submit one brief summary comment noting no issues.
          - If there ARE issues to report and a prior "no issues" comment exists, ensure that prior comment is deleted/minimized/marked as superseded before submitting the new review.
          - If there ARE issues to report, for each suggestion or issue found, add it as a separate GitHub PR comment using the GitHub API as described above. For each suggestion, use the "suggestion" code block format if possible. Each comment should be posted inline on the exact changed line in the PR diff.

          '

      - name: Check blocking review results
        if: env.BLOCKING_REVIEW == 'true'
        run: |
          echo "Checking for critical issues..."
          echo "CRITICAL_ISSUES_FOUND: ${CRITICAL_ISSUES_FOUND:-unset}"
          if [ "${CRITICAL_ISSUES_FOUND:-false}" = "true" ]; then
            echo "❌ Critical issues found and blocking review is enabled. Failing the workflow."
            exit 1
          else
            echo "✅ No blocking issues found."
          fi
